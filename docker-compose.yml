services:
  nginx:
    image: nginx:alpine
    container_name: rtm_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - mysql
    networks:
      - rtm_network

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: rtm_php
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - mysql
      - redis
    networks:
      - rtm_network

  mysql:
    image: mysql:8.0
    container_name: rtm_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: rtm_db
      MYSQL_USER: rtm_user
      MYSQL_PASSWORD: rtm_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - rtm_network

  redis:
    image: redis:alpine
    container_name: rtm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rtm_network

  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: rtm_queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - ./src:/var/www/html
    depends_on:
      - php
      - mysql
      - redis
    networks:
      - rtm_network

networks:
  rtm_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
